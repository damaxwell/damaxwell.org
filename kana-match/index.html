<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Kana Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f0f1a;font-family:'Noto Sans JP',sans-serif;overflow:hidden;position:fixed;inset:0}
#app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;position:relative}
.bg{position:fixed;inset:0;opacity:.05;pointer-events:none;background-image:radial-gradient(circle at 15% 50%,#e83c6a 0%,transparent 45%),radial-gradient(circle at 85% 20%,#3c7be8 0%,transparent 45%),radial-gradient(circle at 50% 85%,#e8c83c 0%,transparent 45%)}
h1{color:#eee;font-size:24px;font-weight:900;letter-spacing:2px;text-shadow:0 0 30px rgba(232,60,106,.25)}
.sub{color:#666;font-size:11px;margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}
.stats{display:flex;gap:20px;justify-content:center;margin-top:10px;color:#888;font-size:12px}
.stats b{color:#fff}.stats .sc{color:#8ce99a}.stats .str{color:#ffa94d}
.labels{display:grid;grid-template-columns:62px 18px 62px 18px 86px;align-items:center;margin-bottom:8px;position:relative;z-index:1}
.lbl{color:#555;font-size:9px;text-align:center;letter-spacing:1.5px;text-transform:uppercase}
.grid{position:relative;z-index:1;transition:all .4s ease}
.grid.out{opacity:0;transform:scale(.95)}
.row{display:grid;grid-template-columns:62px 18px 62px 18px 86px;align-items:center;margin-bottom:10px}
.divider{display:flex;justify-content:center}.divider i{width:1px;height:40px;background:rgba(255,255,255,.06)}
.cell{display:flex;justify-content:center}
button.tile{width:60px;height:60px;border-radius:12px;border:2px solid transparent;background:rgba(255,255,255,.06);color:#ccc;font-size:28px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans JP',sans-serif}
button.tile.sel{background:#3c7be8;color:#fff;border-color:#74c0fc;transform:scale(1.06);box-shadow:0 0 16px rgba(60,123,232,.35)}
button.tile.matched{opacity:.55;cursor:default}
button.tile.wrong-h{border-color:#ff6b6b;transform:translateX(-3px)}
button.tile.wrong-k{border-color:#ff6b6b;transform:translateX(3px)}
.romaji-done{width:82px;height:40px;border-radius:8px;opacity:.55;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:1px}
input.romaji{width:82px;height:40px;border-radius:8px;background:rgba(255,255,255,.04);color:#eee;font-size:15px;font-family:'DM Mono',monospace;font-weight:500;text-align:center;letter-spacing:1px;outline:none;transition:all .2s;border:2px solid rgba(255,255,255,.1)}
input.romaji:focus{border-color:rgba(255,255,255,.3)!important;background:rgba(255,255,255,.07)!important}
input.romaji::placeholder{color:rgba(255,255,255,.15)}
input.romaji.wrong{border-color:#ff6b6b!important;background:rgba(255,107,107,.1)!important;animation:shake .4s ease}
.blank{width:82px;height:40px;border-radius:8px;background:rgba(255,255,255,.02);border:2px dashed rgba(255,255,255,.06)}
.hint{color:#555;font-size:11px;margin-top:20px;text-align:center;letter-spacing:.4px;line-height:1.7;position:relative;z-index:1}
.overlay{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:rgba(15,15,26,.75);animation:fadeIn .3s ease}
.overlay .inner{text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.overlay .emoji{font-size:52px;margin-bottom:8px}
.overlay .title{font-size:28px;font-weight:900;color:#fff;letter-spacing:3px;text-shadow:0 0 30px rgba(218,119,242,.5)}
.overlay .desc{color:#aaa;font-size:13px;margin-top:6px;letter-spacing:1px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="bg"></div>
<div id="app"></div>
<script>
const KANA=[["あ","ア"],["い","イ"],["う","ウ"],["え","エ"],["お","オ"],["か","カ"],["き","キ"],["く","ク"],["け","ケ"],["こ","コ"],["さ","サ"],["し","シ"],["す","ス"],["せ","セ"],["そ","ソ"],["た","タ"],["ち","チ"],["つ","ツ"],["て","テ"],["と","ト"],["な","ナ"],["に","ニ"],["ぬ","ヌ"],["ね","ネ"],["の","ノ"],["は","ハ"],["ひ","ヒ"],["ふ","フ"],["へ","ヘ"],["ほ","ホ"],["ま","マ"],["み","ミ"],["む","ム"],["め","メ"],["も","モ"],["や","ヤ"],["ゆ","ユ"],["よ","ヨ"],["ら","ラ"],["り","リ"],["る","ル"],["れ","レ"],["ろ","ロ"],["わ","ワ"],["を","ヲ"],["ん","ン"]];
const ROM={"あ":"a","い":"i","う":"u","え":"e","お":"o","か":"ka","き":"ki","く":"ku","け":"ke","こ":"ko","さ":"sa","し":"shi","す":"su","せ":"se","そ":"so","た":"ta","ち":"chi","つ":"tsu","て":"te","と":"to","な":"na","に":"ni","ぬ":"nu","ね":"ne","の":"no","は":"ha","ひ":"hi","ふ":"fu","へ":"he","ほ":"ho","ま":"ma","み":"mi","む":"mu","め":"me","も":"mo","や":"ya","ゆ":"yu","よ":"yo","ら":"ra","り":"ri","る":"ru","れ":"re","ろ":"ro","わ":"wa","を":"wo","ん":"n"};
const COLORS=["#ff6b6b","#ffa94d","#74c0fc","#8ce99a","#da77f2"];
const $=id=>document.getElementById(id);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};

let round,selected,matched,wrongH,wrongK,romajiVals,romajiOk,score=0,streak=0,roundNum=0;

function pickRound(){
  const five=shuffle(KANA).slice(0,5);
  return{left:shuffle(five.map(p=>p[0])),right:shuffle(five.map(p=>p[1])),pairs:Object.fromEntries(five),rev:Object.fromEntries(five.map(([h,k])=>[k,h]))};
}

function newRound(){
  round=pickRound();selected=null;matched={};wrongH=null;wrongK=null;romajiVals={};romajiOk={};roundNum++;
  render();
}

function render(){
  const app=$('app');
  let h='';
  // header
  h+=`<div style="text-align:center;margin-bottom:24px;position:relative;z-index:1">`;
  h+=`<h1>仮名マッチ II</h1>`;
  h+=`<div class="sub">Match · then type the romaji</div>`;
  h+=`<div class="stats"><span>Round <b>${roundNum}</b></span><span>Score <b class="sc">${score}</b></span>`;
  if(streak>=3)h+=`<span class="str">🔥 ${streak}</span>`;
  h+=`</div></div>`;
  // labels
  h+=`<div class="labels"><div class="lbl">ひらがな</div><div></div><div class="lbl">カタカナ</div><div></div><div class="lbl">Romaji</div></div>`;
  // grid
  h+=`<div class="grid" id="grid">`;
  round.right.forEach((k,ri)=>{
    const hi=round.left[ri];
    const hM=matched[hi]!==undefined;
    const hCol=hM?COLORS[matched[hi]]:'';
    const kHira=round.rev[k];
    const kM=matched[kHira]!==undefined;
    const kCol=kM?COLORS[matched[kHira]]:'';
    const rDone=romajiOk[k];
    const hCls='tile'+(selected===hi?' sel':'')+(hM?' matched':'')+(wrongH===hi?' wrong-h':'');
    const kCls='tile'+(kM?' matched':'')+(wrongK===k?' wrong-k':'');

    h+=`<div class="row">`;
    // hiragana
    h+=`<div class="cell"><button class="${hCls}" style="${hM?'background:'+hCol+';color:#fff':''}" data-h="${hi}">${hi}</button></div>`;
    h+=`<div class="divider"><i></i></div>`;
    // katakana
    h+=`<div class="cell"><button class="${kCls}" style="${kM?'background:'+kCol+';color:#fff':''}" data-k="${k}">${k}</button></div>`;
    h+=`<div class="divider"><i></i></div>`;
    // romaji
    h+=`<div class="cell">`;
    if(kM&&rDone){
      h+=`<div class="romaji-done" style="background:${kCol}">${ROM[kHira]}</div>`;
    }else if(kM){
      h+=`<input class="romaji" id="r_${k}" data-k="${k}" style="border-color:${kCol}55" placeholder="···" value="${romajiVals[k]||''}" autocomplete="off" autocapitalize="off" spellcheck="false">`;
    }else{
      h+=`<div class="blank"></div>`;
    }
    h+=`</div></div>`;
  });
  h+=`</div>`;
  h+=`<div class="hint">Tap hiragana → tap its katakana → type the romaji</div>`;
  app.innerHTML=h;
  bindEvents();
  // auto-focus first available input
  const firstInput=app.querySelector('input.romaji');
  if(firstInput)setTimeout(()=>firstInput.focus(),30);
}

function bindEvents(){
  document.querySelectorAll('[data-h]').forEach(b=>b.addEventListener('click',()=>{
    const hi=b.dataset.h;
    if(matched[hi]!==undefined)return;
    selected=hi;wrongH=null;wrongK=null;render();
  }));
  document.querySelectorAll('[data-k]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.k;
    if(!selected)return;
    const kHira=round.rev[k];
    if(matched[kHira]!==undefined)return;
    if(round.pairs[selected]===k){
      matched[selected]=Object.keys(matched).length;
      score++;streak++;selected=null;render();
      const inp=document.getElementById('r_'+k);
      if(inp)setTimeout(()=>inp.focus(),30);
    }else{
      wrongH=selected;wrongK=k;streak=0;render();
      setTimeout(()=>{wrongH=null;wrongK=null;render()},450);
    }
  }));
  document.querySelectorAll('input.romaji').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const k=inp.dataset.k;
      const clean=inp.value.toLowerCase().replace(/[^a-z]/g,'');
      inp.value=clean;romajiVals[k]=clean;
      const correct=ROM[round.rev[k]];
      if(clean===correct){
        romajiOk[k]=true;score++;
        render();
        checkComplete();
        // focus next
        const next=round.right.find(rk=>rk!==k&&matched[round.rev[rk]]!==undefined&&!romajiOk[rk]);
        if(next){const ni=document.getElementById('r_'+next);if(ni)setTimeout(()=>ni.focus(),30);}
      }else if(clean.length>=correct.length){
        streak=0;inp.classList.add('wrong');
        setTimeout(()=>{romajiVals[k]='';render();},450);
      }
    });
  });
}

function checkComplete(){
  const matchCount=Object.keys(matched).length;
  const romCount=Object.keys(romajiOk).length;
  if(matchCount===5&&romCount===5){
    setTimeout(()=>{
      // show celebration
      const ov=document.createElement('div');
      ov.className='overlay';
      ov.innerHTML=`<div class="inner"><div class="emoji">✨</div><div class="title">完璧!</div><div class="desc">Perfect round!</div></div>`;
      $('app').appendChild(ov);
      setTimeout(()=>{
        const grid=document.getElementById('grid');
        if(grid)grid.classList.add('out');
        setTimeout(()=>newRound(),500);
      },1800);
    },200);
  }
}

// init
newRound();

// register service worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
